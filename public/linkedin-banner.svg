<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06010f"/>
      <stop offset="50%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#121828"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Subtle code lines (left background) -->
  <g opacity="0.12" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">
    <text x="48" y="52">def build_solutions():</text>
    <text x="64" y="68">    focus = 'quality'</text>
    <text x="64" y="84">    return impact</text>
    <text x="48" y="112">import React from 'react'</text>
    <text x="48" y="128">const Developer = () =&gt; { ... }</text>
  </g>

  <!-- Abstract waveform (right) -->
  <g filter="url(#glow)" opacity="0.85">
    <path d="M900,280 Q980,180 1060,240 T1220,200 T1380,260 T1584,220" fill="none" stroke="url(#wave)" stroke-width="2.5"/>
    <path d="M880,300 Q960,200 1040,260 T1200,220 T1360,280 T1584,240" fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.6"/>
    <path d="M920,320 Q1000,220 1080,280 T1240,240 T1400,300" fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.4"/>
    <!-- Data bars -->
    <rect x="1180" y="160" width="3" height="80" fill="#6366f1" opacity="0.5" rx="1"/>
    <rect x="1200" y="140" width="3" height="100" fill="#8b5cf6" opacity="0.6" rx="1"/>
    <rect x="1220" y="170" width="3" height="70" fill="#22d3ee" opacity="0.5" rx="1"/>
    <rect x="1240" y="130" width="3" height="110" fill="#6366f1" opacity="0.7" rx="1"/>
    <rect x="1260" y="155" width="3" height="85" fill="#22d3ee" opacity="0.5" rx="1"/>
  </g>

  <!-- Safe zone text (center-left) -->
  <rect x="80" y="100" width="4" height="64" fill="url(#accent)" rx="2"/>
  <text x="110" y="155" fill="#ffffff" font-family="system-ui, 'Segoe UI', sans-serif" font-size="52" font-weight="700">Jorge Otero</text>
  <text x="110" y="205" fill="rgba(226,232,240,0.85)" font-family="system-ui, 'Segoe UI', sans-serif" font-size="24" font-weight="500">Full Stack Developer � Python + React</text>
  <text x="110" y="245" fill="rgba(148,163,184,0.7)" font-family="system-ui, 'Segoe UI', sans-serif" font-size="16" font-weight="400">Buenos Aires � Remote</text>
</svg>
